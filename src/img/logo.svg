<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3c"/>
      <stop offset="100%" style="stop-color:#0f1428"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7c32"/>
      <stop offset="100%" style="stop-color:#ffb347"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>

  <!-- Compression bars (left side, descending = compression) -->
  <rect x="14" y="38" width="6" height="52" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="23" y="48" width="6" height="32" rx="3" fill="url(#accent)" opacity="0.75"/>
  <rect x="32" y="54" width="6" height="20" rx="3" fill="url(#accent)" opacity="0.6"/>

  <!-- Arrow (compression indicator) -->
  <polyline points="42,64 48,58 48,70" fill="none" stroke="#ff7c32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- PFC text -->
  <text x="56" y="73" font-family="'Arial', sans-serif" font-weight="900" font-size="30" fill="url(#accent)" letter-spacing="-1">PFC</text>

  <!-- Bottom label -->
  <text x="64" y="102" font-family="'Arial', sans-serif" font-weight="400" font-size="9.5" fill="#8892b0" text-anchor="middle" letter-spacing="2.5">GRAFANA</text>
</svg>
